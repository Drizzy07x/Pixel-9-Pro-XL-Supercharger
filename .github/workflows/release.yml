name: Supercharger Auto-Release Engine

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version Info
        id: version_logic
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          CHANNEL="stable"
          PRERELEASE="false"
          TITLE_SUFFIX=""

          if [[ "$TAG_NAME" == *"-alpha"* ]]; then
            CHANNEL="alpha"
            PRERELEASE="true"
            TITLE_SUFFIX=" (Alpha)"
          elif [[ "$TAG_NAME" == *"-beta"* ]]; then
            CHANNEL="beta"
            PRERELEASE="true"
            TITLE_SUFFIX=" (Beta)"
          elif [[ "$TAG_NAME" == *"-rc"* ]]; then
            CHANNEL="rc"
            PRERELEASE="true"
            TITLE_SUFFIX=" (RC)"
          fi

          ASSET_BASENAME="Pixel-9-Pro-Series-Supercharger-${TAG_NAME}"
          RELEASE_TITLE="Pixel 9 Pro Series Supercharger ${TAG_NAME}${TITLE_SUFFIX}"

          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "asset_basename=$ASSET_BASENAME" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Create Module ZIP
        shell: bash
        run: |
          ZIP_NAME="${{ steps.version_logic.outputs.asset_basename }}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" \
               ".github/*" \
               ".gitignore" \
               ".gitattributes" \
               "README.md" \
               "LICENSE" \
               "changelog.md" \
               "*.log" \
               "*.tmp" \
               ".DS_Store"

          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"

      - name: Generate Release Notes
        shell: bash
        run: |
          python3 << 'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          channel = os.environ["CHANNEL"]
          title = os.environ["RELEASE_TITLE"]
          asset = os.environ["ASSET_BASENAME"]

          changelog = Path("changelog.md")
          body = None

          def extract_section(text: str, candidates: list[str]) -> str | None:
              lines = text.splitlines()
              starts = []
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("## "):
                      starts.append(i)

              for i in starts:
                  heading = lines[i].strip()
                  for candidate in candidates:
                      pattern = re.compile(
                          rf"^##\s+\[?{re.escape(candidate)}\]?(?:\s|$|-)",
                          re.IGNORECASE
                      )
                      if pattern.search(heading):
                          j = i + 1
                          while j < len(lines) and not lines[j].startswith("## "):
                              j += 1
                          section = "\n".join(lines[i:j]).strip()
                          return section
              return None

          if changelog.exists():
              text = changelog.read_text(encoding="utf-8", errors="ignore")
              normalized = tag[1:] if tag.lower().startswith("v") else tag
              candidates = [tag, normalized]
              body = extract_section(text, candidates)

          if not body:
              prerelease_note = ""
              if channel != "stable":
                  prerelease_note = f"\n> This is a **{channel.upper()} prerelease**.\n"

              body = f"""## {title}

          Automated release package for `{tag}`.{prerelease_note}

          ### Assets
          - `{asset}.zip`
          - `{asset}.zip.sha256`

          ### Notes
          - Built automatically from the tagged source
          - Prerelease status is inferred from the tag suffix (`-alpha`, `-beta`, `-rc`)
          - Stable releases are marked as latest
          """

          Path("release-notes.md").write_text(body.strip() + "\n", encoding="utf-8")
          PY
        env:
          TAG_NAME: ${{ steps.version_logic.outputs.tag_name }}
          CHANNEL: ${{ steps.version_logic.outputs.channel }}
          RELEASE_TITLE: ${{ steps.version_logic.outputs.release_title }}
          ASSET_BASENAME: ${{ steps.version_logic.outputs.asset_basename }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version_logic.outputs.release_title }}
          tag_name: ${{ steps.version_logic.outputs.tag_name }}
          prerelease: ${{ steps.version_logic.outputs.is_prerelease }}
          make_latest: ${{ steps.version_logic.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          preserve_order: true
          files: |
            ${{ steps.version_logic.outputs.asset_basename }}.zip
            ${{ steps.version_logic.outputs.asset_basename }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}